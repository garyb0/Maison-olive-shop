<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Chez Olive</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fbf7ef;
        --ink: #242319;
        --muted: #706a5b;
        --olive: #545d2e;
        --line: #ded5c4;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 420px);
        display: grid;
        gap: 18px;
        text-align: left;
      }

      .mark {
        width: 64px;
        height: 64px;
        border: 1px solid var(--line);
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: #fffdf8;
        color: var(--olive);
        font-size: 30px;
        font-weight: 800;
      }

      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.5;
      }

      a,
      button {
        min-height: 48px;
        border-radius: 8px;
        border: 0;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0 18px;
        background: var(--olive);
        color: #fff;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding-top: 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">O</div>
      <h1>Connexion a Chez Olive impossible</h1>
      <p>
        L'application n'arrive pas a joindre la boutique pour le moment. Verifie ta connexion Internet, puis
        reessaie.
      </p>
      <div class="actions">
        <button type="button" onclick="window.location.reload()">Reessayer</button>
        <a href="https://chezolive.ca/app">Ouvrir le site</a>
      </div>
    </main>
  </body>
</html>
